<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cyber VRC (Accounts)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 左上HUD -->
    <div id="ui" class="cyber-panel">
      <div class="cyber-title">CYBER VRC</div>

      <div id="account-ui" class="cyber-block">
        <label>ユーザー名 (ID)</label>
        <input id="username" placeholder="username" />
        <label>表示名</label>
        <input id="displayName" placeholder="表示名" />
        <div class="small-text">
          Socket ID: <span id="socketIdLabel">-</span>
        </div>
        <button id="accountSaveBtn" class="cyber-btn">サーバに保存</button>
        <button id="accountLoadBtn" class="cyber-btn">サーバからロード</button>
      </div>

      <div id="room-ui" class="cyber-block">
        <label>Room ID</label>
        <input id="roomId" placeholder="Room ID" />
        <button id="joinRoomBtn" class="cyber-btn">Join / Create</button>
      </div>

      <div id="voice-ui" class="cyber-block">
        <button id="startVoiceBtn" class="cyber-btn accent">
          音声チャット開始
        </button>
      </div>

      <div id="sns-ui" class="cyber-block">
        <div class="block-title">GLOBAL FEED</div>
        <div id="sns-feed" class="cyber-scroll"></div>
        <input id="sns-text" placeholder="メッセージ" />
        <button id="sns-send" class="cyber-btn">投稿</button>
      </div>

      <div id="phone-hint" class="cyber-block small-text">
        PHONE KEY: <span id="phoneKeyLabel">P</span>
      </div>
    </div>

    <!-- スマホUI -->
    <div id="phone" class="phone hidden">
      <div id="phone-header" class="phone-header">
        <span>NEO DEVICE</span>
        <button id="phone-close" class="phone-close">×</button>
      </div>
      <div id="phone-tabs" class="phone-tabs">
        <button data-tab="settings" class="phone-tab-btn">設定</button>
        <button data-tab="account" class="phone-tab-btn">アカウント</button>
        <button data-tab="room" class="phone-tab-btn">ルーム</button>
        <button data-tab="avatar" class="phone-tab-btn">アバター</button>
        <button data-tab="sns" class="phone-tab-btn">SNS</button>
        <button data-tab="dm" class="phone-tab-btn">DM</button>
      </div>
      <div id="phone-content" class="phone-content">
        <!-- 設定タブ -->
        <div class="phone-tab" id="tab-settings">
          <h4>設定</h4>
          <label>
            スマホキー:
            <input id="phoneKeyInput" placeholder="例: P" maxlength="1" />
          </label>
          <button id="phoneKeySave" class="cyber-btn">保存</button>
        </div>

        <!-- アカウントタブ -->
        <div class="phone-tab hidden" id="tab-account">
          <h4>アカウント</h4>
          <label>
            ユーザー名:
            <input id="phoneUsername" placeholder="username" />
          </label>
          <label>
            表示名:
            <input id="phoneDisplayName" placeholder="表示名" />
          </label>
          <button id="phoneAccountApply" class="cyber-btn">適用</button>
        </div>

        <!-- ルーム模様替えタブ -->
        <div class="phone-tab hidden" id="tab-room">
          <h4>ルーム模様替え</h4>
          <label>
            地面の色:
            <input id="roomGroundColor" type="color" value="#7BC8A4" />
          </label>
          <label>
            ボックスの色:
            <input id="roomBoxColor" type="color" value="#4CC3D9" />
          </label>
          <button id="roomApply" class="cyber-btn">適用</button>
        </div>

        <!-- アバター設定タブ -->
        <div class="phone-tab hidden" id="tab-avatar">
          <h4>アバター設定</h4>
          <label>
            アバター色:
            <input id="avatarColorInput" type="color" value="#FFAA00" />
          </label>
          <button id="avatarApply" class="cyber-btn">適用</button>
        </div>

        <!-- SNSタブ（スマホ版） -->
        <div class="phone-tab hidden" id="tab-sns">
          <h4>SNS</h4>
          <div id="phone-sns-feed" class="cyber-scroll"></div>
          <input id="phone-sns-text" placeholder="メッセージ" />
          <button id="phone-sns-send" class="cyber-btn">投稿</button>
        </div>

        <!-- DMタブ -->
        <div class="phone-tab hidden" id="tab-dm">
          <h4>DM</h4>
          <div class="small-text">
            宛先ユーザー名を指定してメッセージを送信します。
          </div>
          <label>
            宛先ユーザー名:
            <input id="dm-to-username" placeholder="相手の username" />
          </label>
          <label>
            宛先 Socket ID:
            <input id="dm-to-socket" placeholder="相手の Socket ID" />
          </label>
          <div id="dm-log" class="cyber-scroll"></div>
          <input id="dm-text" placeholder="メッセージ" />
          <button id="dm-send" class="cyber-btn">送信</button>
        </div>
      </div>
    </div>

    <!-- 3Dシーン -->
    <a-scene id="scene">
      <a-assets>
        <template id="avatar-template">
          <a-entity>
            <a-sphere radius="0.25" color="#FFC65D" position="0 1.6 0"></a-sphere>
            <a-cylinder
              radius="0.25"
              height="1.2"
              color="#4CC3D9"
              position="0 0.8 0"
            ></a-cylinder>
          </a-entity>
        </template>
      </a-assets>

      <!-- 自分のアバター＋ネームタグ -->
      <a-entity id="playerRoot" position="0 1 0">
        <a-entity
          id="playerCamera"
          camera
          position="0 1.6 0"
          look-controls="enabled: false"
        ></a-entity>
        <a-entity
          id="playerAvatar"
          geometry="primitive: box; height: 1.6; width: 0.5; depth: 0.5"
          material="color: #FFAA00"
          position="0 0.8 0"
        ></a-entity>
        <a-entity
          id="playerNameTag"
          text="value: Guest; align: center; color: #00FFFF; width: 4"
          position="0 2.2 0"
        ></a-entity>
      </a-entity>

      <!-- 地面とオブジェクト -->
      <a-plane
        id="ground"
        position="0 0 0"
        rotation="-90 0 0"
        width="50"
        height="50"
        color="#7BC8A4"
      ></a-plane>

      <a-box id="box1" position="0 0.5 -3" color="#4CC3D9"></a-box>
      <a-sphere position="2 1 -3" radius="1" color="#EF2D5E"></a-sphere>
    </a-scene>

    <script src="client.js"></script>
    <script src="sns.js"></script>
  </body>
</html>
