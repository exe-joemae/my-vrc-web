<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Web VRC with Voice & SNS</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui">
      <div id="room-ui">
        <input id="roomId" placeholder="Room ID" />
        <button id="joinRoomBtn">Join / Create Room</button>
      </div>

      <div id="voice-ui">
        <button id="startVoiceBtn">音声チャット開始</button>
      </div>

      <div id="sns-ui">
        <h3>全ルーム共通SNS</h3>
        <div id="sns-feed"></div>
        <input id="sns-name" placeholder="名前" />
        <input id="sns-text" placeholder="メッセージ" />
        <button id="sns-send">投稿</button>
      </div>
    </div>

    <a-scene id="scene">
      <a-assets>
        <template id="avatar-template">
          <a-sphere radius="0.2" color="#FFC65D"></a-sphere>
        </template>
      </a-assets>

      <a-entity
        id="player"
        position="0 1.6 0"
        camera
        look-controls
        wasd-controls
      ></a-entity>

      <a-box position="0 0.5 -3" color="#4CC3D9"></a-box>
      <a-sphere position="2 1 -3" radius="1" color="#EF2D5E"></a-sphere>
      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="#7BC8A4"
      ></a-plane>
    </a-scene>

    <script src="client.js"></script>
    <script src="sns.js"></script>
  </body>
</html>
